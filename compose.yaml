services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  fergusson:
    build: .
    environment:
      - REDIS_HOST=redis
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: always
    volumes:
      - ./workspace:/app/workspace

    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          initial_sync: true
        - action: rebuild
          path: pyproject.toml